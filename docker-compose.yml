services:
  server:
    build: ./server
    restart: unless-stopped
    networks:
      - internal

  web:
    image: nginx:alpine
    container_name: llm_search_web
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - internal
      - caddy
    labels:
      caddy: llm-search.damoon.dev
      caddy.reverse_proxy: "{{upstreams 80}}"

networks:
  internal:
  caddy:
    external: true
